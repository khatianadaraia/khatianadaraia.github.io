{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Neat typography: Inter (headings/UI) + Source Serif 4 (body prose) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

<style>
  /* Body prose — elegant, readable serif */
  body,
  .page__content,
  .page__content p,
  .page__content li {
    font-family: "Source Serif 4", Georgia, Cambria, "Times New Roman", serif;
  }

  /* Headings, navigation, author sidebar, buttons — clean modern sans */
  h1, h2, h3, h4, h5, h6,
  .masthead, .greedy-nav, .site-title,
  .author__name, .author__bio,
  .page__title, .page__meta,
  .archive__item-title, .btn {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Neatly justified, comfortably spaced reading text */
  .page__content p,
  .page__content li {
    text-align: justify;
    text-justify: inter-word;
    -webkit-hyphens: auto;
    -ms-hyphens: auto;
    hyphens: auto;
    line-height: 1.75;
  }

  /* Keep the cat-photo caption image centered, not stretched */
  .page__content p > img {
    display: block;
    margin: 1.5em auto 0.5em;
  }
</style>

<!-- end custom head snippets -->
